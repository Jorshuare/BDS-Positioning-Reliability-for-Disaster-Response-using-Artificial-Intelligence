# RTKLIB rnx2rtkp options — BeiDou-only standalone single-point positioning (SPP).
# Positioning mode, elevation mask, and solution-status output level are passed
# on the CLI instead (documented, version-stable flags: -p 0, -m 10, -y 2);
# only options with no CLI equivalent in this RTKLIB build are set here.

pos1-navsys      =32      # BeiDou only (RTKLIB SYS_CMP bit)
pos1-ionoopt     =brdc    # Klobuchar broadcast ionospheric correction
pos1-tropopt     =saas    # Saastamoinen tropospheric correction
pos1-sateph      =brdc    # broadcast ephemeris (no precise orbit/clock products)
pos1-dynamics    =off     # code-only SPP, no dynamics model
pos2-armode      =off     # no ambiguity resolution in single/code-only mode
